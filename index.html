    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const { createRoot } = ReactDOM;

        // --- PREDEFINED CAPTAINS LIST ---
        const PREDEFINED_CAPTAINS = [
            "Aaron Wilson", "Alan Fraser", "Andrew Dickens", "Angela Attew", "Ant Crowther", 
            "Ash Jeeves", "Charlie Malt", "Cheryl Pack", "Chris Canning", "Chris Gudgin",

            "John Wright", "Jonny Foster", "Kieran Johnson", "Laurie Farmer", "Lorenzo Viscusi", 
            "Martin Warman", "Martin Williams", "Matt Pullinger", "Mick Pichowicz", "Neil Jakings", 
            "Neil Wilson", "Paul Barton", "Peter Sulman", "Shelley Burgoine", "Stephen Barnett", 
            "Stephen Vine", "Steve Roberts", "Tim O'Leary", "Trevor Fordham", "Trish Coleburt", 
            "Vikki Sulman", "Will Monk"
        ];

        const SETUP_STEPS = [
            { n: 1, label: 'Room' },
            { n: 2, label: 'Format' },
            { n: 3, label: 'Options' },
            { n: 4, label: 'Boards' },
            { n: 5, label: 'Players' },
        ];

        // --- UTILITY FUNCTIONS ---
        const shuffleArray = (array) => {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        };

        const getNextPowerOf2 = (n) => {
            if (n === 0) return 0;
            let count = 1;
            while (count < n) count *= 2;
            return count;
        };

        // Resolves once the Firebase module script has set window.fb, instead of
        // guessing with a fixed setTimeout (which can lose the race on slow connections).
        const getFirebase = () => new Promise((resolve, reject) => {
            if (window.fb) { resolve(window.fb); return; }
            let timeoutId;
            const onReady = () => {
                clearTimeout(timeoutId);
                resolve(window.fb);
            };
            window.addEventListener('fb-ready', onReady, { once: true });
            timeoutId = setTimeout(() => {
                window.removeEventListener('fb-ready', onReady);
                reject(new Error('Firebase failed to load. Please check your internet connection.'));
            }, 8000);
        });

        // --- TOURNAMENT PROGRESSION LOGIC ---
        const processTournamentProgression = (currentMatches, currentBoards, currentGameMode) => {
            let updatedMatches = currentMatches.map(m => ({ ...m }));
            let updatedBoards = [...currentBoards];
            let newChampion = null;

            // 1. Advance Bracket
            if (currentGameMode === 'knockout' || currentGameMode === 'seeded48') {
                updatedMatches = updatedMatches.map(match => {
                    // Check if match has AT LEAST one source match (seeded48 has some single-source matches in R2)
                    if (match.sourceMatch1 || match.sourceMatch2) {
                        const s1 = match.sourceMatch1 ? updatedMatches.find(m => m.id === match.sourceMatch1) : null;
                        const s2 = match.sourceMatch2 ? updatedMatches.find(m => m.id === match.sourceMatch2) : null;
                        
                        let nextP1 = match.p1;
                        let nextP2 = match.p2;
                        let nextStatus = match.status;

                        if (s1?.winner && (!match.p1 || match.p1.id !== s1.winner.id)) nextP1 = s1.winner;
                        if (s2?.winner && (!match.p2 || match.p2.id !== s2.winner.id)) nextP2 = s2.winner;

                        if (nextP1 && nextP2 && nextStatus === 'scheduled') {
                            nextStatus = 'pending';
                        }
                        
                        if (nextP1 !== match.p1 || nextP2 !== match.p2 || nextStatus !== match.status) {
                            return { ...match, p1: nextP1, p2: nextP2, status: nextStatus };
                        }
                    }
                    return match;
                });

                const finalMatch = updatedMatches[updatedMatches.length - 1];
                if (finalMatch?.winner) {
                    newChampion = finalMatch.winner;
                }
            }

            // 2. Assign Boards
            const freeIndices = updatedBoards.map((b, i) => b === null ? i : -1).filter(i => i !== -1);
            if (freeIndices.length > 0) {
                const pendingMatches = updatedMatches
                    .filter(m => m.status === 'pending' && m.boardId === null)
                    .sort((a, b) => (a.round - b.round) || (a.id - b.id));

                for (let i = 0; i < Math.min(freeIndices.length, pendingMatches.length); i++) {
                    const boardIdx = freeIndices[i];
                    const matchToAssign = pendingMatches[i];

                    const matchIndex = updatedMatches.findIndex(m => m.id === matchToAssign.id);
                    updatedMatches[matchIndex] = {
                        ...updatedMatches[matchIndex],
                        status: 'active',
                        boardId: boardIdx,
                        startTime: Date.now(), 
                        announced: false 
                    };
                    updatedBoards[boardIdx] = matchToAssign.id;
                }
            }

            return { updatedMatches, updatedBoards, newChampion };
        };

        // --- COMPONENTS ---
        const Confetti = () => (
            <div className="fixed inset-0 pointer-events-none z-50 flex items-center justify-center overflow-hidden">
                {[...Array(50)].map((_, i) => (
                    <div key={i} className="absolute w-2 h-2 bg-emerald-500 rounded-full animate-confetti"
                        style={{
                            left: `${Math.random() * 100}%`,
                            top: `-5%`,
                            backgroundColor: ['#10b981', '#fbbf24', '#3b82f6', '#ef4444'][Math.floor(Math.random() * 4)],
                            animationDuration: `${Math.random() * 3 + 2}s`,
                            animationDelay: `${Math.random() * 2}s`
                        }}
                    />
                ))}
            </div>
        );

        const Card = ({ children, className = "" }) => (
            <div className={`bg-slate-800 border border-slate-600 rounded-xl shadow-lg overflow-hidden ${className}`}>
                {children}
            </div>
        );

        const Button = ({ onClick, children, variant = 'primary', disabled = false, className = '' }) => {
            const baseStyle = "px-4 py-3 rounded-lg font-bold flex items-center justify-center gap-2 transition-all active:scale-95 touch-manipulation text-lg tracking-wide";
            const variants = {
                primary: "bg-emerald-600 hover:bg-emerald-500 text-white shadow-emerald-900/20 shadow-lg border border-emerald-500",
                secondary: "bg-slate-700 hover:bg-slate-600 text-white border border-slate-600",
                danger: "bg-red-600 hover:bg-red-500 text-white border border-red-500",
                outline: "border-2 border-slate-500 text-slate-300 hover:border-slate-400 hover:text-white",
                ghost: "bg-transparent hover:bg-slate-700 text-slate-400 hover:text-white"
            };

            return (
                <button onClick={onClick} disabled={disabled}
                    className={`${baseStyle} ${variants[variant]} ${disabled ? 'opacity-50 cursor-not-allowed' : ''} ${className}`}>
                    {children}
                </button>
            );
        };

        const Modal = ({ title, message, onClose, type = 'info' }) => (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
                <div className="bg-slate-800 border-2 border-slate-500 rounded-xl shadow-2xl max-w-sm w-full p-6 space-y-4">
                    <div className="text-center">
                        <div className="text-4xl mb-2">
                            {type === 'error' ? '⚠️' : type === 'match' ? '🎯' : '🏆'}
                        </div>
                        <h3 className="text-2xl font-bold text-white tracking-wide">{title}</h3>
                        <div className="text-slate-200 text-xl mt-3 font-medium leading-relaxed">{message}</div>
                    </div>
                    <Button onClick={onClose} className="w-full" variant={type === 'error' ? 'danger' : 'primary'}>
                        {type === 'error' ? 'Close' : "Let's Play!"}
                    </Button>
                </div>
            </div>
        );

        // --- PROJECTOR COMPONENT ---
        const ProjectorView = ({ boards, boardNames, matches, scorers, getRoundLabel, gameMode, tournamentId, tournamentName }) => {
            const [recentWinners, setRecentWinners] = useState({});
            const [currentTime, setCurrentTime] = useState(Date.now());
            const prevBoardsRef = useRef(boards);
            const winnerTimeouts = useRef({});

            useEffect(() => {
                const interval = setInterval(() => setCurrentTime(Date.now()), 10000);
                return () => clearInterval(interval);
            }, []);

            useEffect(() => {
                boards.forEach((currentMatchId, idx) => {
                    const prevMatchId = prevBoardsRef.current[idx];
                    
                    if (prevMatchId && prevMatchId !== currentMatchId) {
                        const prevMatch = matches.find(m => m.id === prevMatchId);
                        if (prevMatch && prevMatch.status === 'completed' && prevMatch.winner) {
                            
                            if (winnerTimeouts.current[idx]) {
                                clearTimeout(winnerTimeouts.current[idx]);
                            }
                            
                            setRecentWinners(curr => ({ ...curr, [idx]: { winnerName: prevMatch.winner.name } }));

                            winnerTimeouts.current[idx] = setTimeout(() => {
                                setRecentWinners(curr => {
                                    const finalState = { ...curr };
                                    delete finalState[idx];
                                    return finalState;
                                });
                            }, 5000); 
                        }
                    }
                });

                prevBoardsRef.current = boards;
            }, [boards, matches]);

            useEffect(() => {
                return () => {
                    Object.values(winnerTimeouts.current).forEach(clearTimeout);
                };
            }, []);

            const upcomingList = matches
                .filter(m => m.status === 'pending' || m.status === 'scheduled')
                .sort((a, b) => {
                    if (a.status === 'pending' && b.status !== 'pending') return -1;
                    if (a.status !== 'pending' && b.status === 'pending') return 1;
                    return (a.round - b.round) || (a.id - b.id);
                });
            
            const displayBoards = boards.map((mId, i) => ({ idx: i, match: matches.find(m => m.id === mId) }));
            
            const count = displayBoards.length;
            let gridClass = "grid-cols-1";
            if (count > 1) gridClass = "grid-cols-2";
            if (count > 4) gridClass = "grid-cols-3";
            if (count > 9) gridClass = "grid-cols-4";
            if (count > 16) gridClass = "grid-cols-5";

            // More boards need to share the same fixed screen height, so shrink text,
            // padding and gaps as count grows instead of letting rows overflow the page.
            const fontClass = count <= 2 ? 'text-7xl' : count <= 4 ? 'text-5xl' : count <= 6 ? 'text-4xl' : count <= 9 ? 'text-3xl' : count <= 16 ? 'text-2xl' : 'text-xl';
            const cardPadding = count <= 4 ? 'p-8' : count <= 9 ? 'p-4' : 'p-2';
            const gapClass = count <= 4 ? 'gap-6' : count <= 9 ? 'gap-3' : 'gap-2';
            const roundedClass = count <= 4 ? 'rounded-[2rem]' : 'rounded-xl';
            const labelClass = count <= 4 ? 'text-3xl mb-4' : count <= 9 ? 'text-xl mb-2' : 'text-base mb-1';
            const vsClass = count <= 4 ? 'text-3xl' : count <= 9 ? 'text-xl' : 'text-base';
            const innerGap = count <= 4 ? 'gap-4' : count <= 9 ? 'gap-2' : 'gap-1';
            const badgeClass = count <= 4 ? 'px-6 py-2 text-xl' : count <= 9 ? 'px-3 py-1 text-sm' : 'px-2 py-0.5 text-xs';
            const scorerClass = count <= 4 ? 'px-4 py-3 text-lg' : count <= 9 ? 'px-2 py-1 text-sm' : 'px-1 py-0.5 text-xs';
            const openClass = count <= 4 ? 'text-4xl lg:text-5xl' : count <= 9 ? 'text-2xl' : 'text-base';

            return (
                <div className="h-full w-full bg-slate-950 flex flex-col p-6 overflow-hidden">
                    <div className={`grid ${gridClass} auto-rows-fr ${gapClass} flex-1 min-h-0`}>
                        {displayBoards.map(({ idx, match }) => {
                            const isWinner = recentWinners[idx];
                            const isNewMatch = match && match.startTime && (currentTime - match.startTime < 180000);

                            return (
                                <div key={idx} className={`flex flex-col justify-center items-center ${roundedClass} ${cardPadding} min-h-0 transition-all duration-500 overflow-hidden relative ${isWinner ? 'border-4 border-yellow-400 bg-emerald-900 animate-winner z-10' : match ? (isNewMatch ? 'bg-slate-900 animate-new-match' : 'border-4 border-emerald-500 bg-slate-900 shadow-[0_0_40px_rgba(16,185,129,0.1)]') : 'border-4 border-slate-800 opacity-40'}`}>
                                    {isWinner ? (
                                        <div className="flex flex-col items-center justify-center h-full w-full gap-4 text-center animate-fade-in absolute inset-0 bg-emerald-900 z-20">
                                            <div className="text-8xl mb-4">🏆</div>
                                            <div className="text-3xl font-black text-yellow-400 uppercase tracking-widest drop-shadow-md">Winner!</div>
                                            <div className={`${fontClass} font-black text-white uppercase drop-shadow-lg px-4 text-center break-words`}>{isWinner.winnerName}</div>
                                        </div>
                                    ) : null}

                                    <div className={`${labelClass} font-black text-slate-500 uppercase tracking-widest text-center w-full z-0 truncate flex-shrink-0`}>
                                        {boardNames[idx] || `Board ${idx + 1}`}
                                    </div>

                                    {match ? (
                                        <div className={`flex flex-col items-center ${innerGap} w-full flex-1 min-h-0 z-0 overflow-hidden`}>
                                            <div className={`${fontClass} font-black text-white text-center uppercase break-words w-full shrink-0`}>
                                                {match.p1?.name || 'TBD'}
                                            </div>
                                            <div className={`text-emerald-500 font-black ${vsClass} italic opacity-40 shrink-0`}>VS</div>
                                            <div className={`${fontClass} font-black text-white text-center uppercase break-words w-full shrink-0`}>
                                                {match.p2?.name || 'TBD'}
                                            </div>

                                            <div className={`mt-auto w-full flex flex-col items-center ${innerGap} min-h-0 overflow-hidden`}>
                                                <div className={`${badgeClass} rounded-full font-black border-2 uppercase ${isNewMatch ? 'bg-amber-600/20 text-amber-400 border-amber-500/30' : 'bg-emerald-600/20 text-emerald-400 border-emerald-500/30'}`}>
                                                    {getRoundLabel(match.round)}
                                                </div>
                                                <div className={`bg-slate-800 text-slate-300 ${scorerClass} rounded-lg font-bold border border-slate-700 w-full text-center uppercase tracking-widest shadow-inner truncate`}>
                                                    Scorer: <span className={isNewMatch ? "text-amber-400 ml-2" : "text-emerald-400 ml-2"}>{scorers[idx] || 'REQUIRED'}</span>
                                                </div>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="flex-1 flex flex-col items-center justify-center text-center opacity-60 z-0 min-h-0">
                                            <div className={`text-slate-600 font-black ${openClass} italic uppercase mb-2`}>Board Open</div>
                                            <div className={`text-slate-500 font-bold ${count <= 4 ? 'text-lg lg:text-xl' : 'text-sm'} tracking-widest uppercase`}>Awaiting Next Match</div>
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                    
                    <div className="mt-6 flex flex-col gap-4">
                        {upcomingList.length > 0 && (
                            <div className="bg-slate-800 border-2 border-slate-700 rounded-xl p-4 flex items-center gap-4 shadow-lg">
                                 <div className="bg-emerald-600 text-white font-black px-4 py-2 rounded uppercase tracking-widest whitespace-nowrap shadow-md">🔜 Up Next</div>
                                 <div className="flex gap-6 overflow-hidden flex-1 items-center">
                                     {upcomingList.slice(0, 4).map((m, i) => (
                                         <div key={m.id} className={`flex items-center gap-3 text-xl font-bold truncate ${m.status === 'pending' ? 'text-white' : 'text-slate-500'}`}>
                                             <span className="truncate">{m.p1 ? m.p1.name : 'TBD'}</span>
                                             <span className="text-slate-600 text-sm italic">vs</span>
                                             <span className="truncate">{m.p2 ? m.p2.name : 'TBD'}</span>
                                             {i < 3 && i < upcomingList.length - 1 && <span className="text-slate-700 ml-4 font-normal">|</span>}
                                         </div>
                                     ))}
                                 </div>
                            </div>
                        )}
                        <div className="flex justify-between items-center text-slate-600 font-black tracking-widest text-sm uppercase px-4">
                            <span>The Burnaby Arms <span className="text-emerald-500 mx-2">•</span> {tournamentName} <span className="text-emerald-500 mx-2">•</span> PIN: {tournamentId}</span>
                            <div className="flex items-center gap-2"><span className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> Live Sync</div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- MAIN APP ---
        function App() {
            const [user, setUser] = useState(null);
            const generatePin = () => Math.floor(1000 + Math.random() * 9000).toString();
            // Lets a second tab/device join the same room automatically via a ?pin=1234 link,
            // instead of having to retype the PIN into "Join Existing Room" every time.
            const urlParams = new URLSearchParams(window.location.search);
            const pinFromUrl = urlParams.get('pin');
            const [tournamentId, setTournamentId] = useState(() => (pinFromUrl && /^\d{3,4}$/.test(pinFromUrl)) ? pinFromUrl : generatePin());
            const [tournamentName, setTournamentName] = useState('Darts Event');
            const [joinPin, setJoinPin] = useState('');
            const [phase, setPhase] = useState('setup'); 
            const [gameMode, setGameMode] = useState('knockout'); // knockout, league, seeded48
            const [isDoubles, setIsDoubles] = useState(false); 
            const [captainsCupMode, setCaptainsCupMode] = useState(false); 
            const [playerInput, setPlayerInput] = useState('');
            const [playerInput2, setPlayerInput2] = useState(''); 
            const [players, setPlayers] = useState([]);
            const [boardCount, setBoardCount] = useState(2);
            const [matches, setMatches] = useState([]);
            const [totalRounds, setTotalRounds] = useState(0);
            const [notification, setNotification] = useState(null); 
            const [boards, setBoards] = useState([]); 
            const [boardNames, setBoardNames] = useState([]); 
            const [scorers, setScorers] = useState([]); 
            const [champion, setChampion] = useState(null);
            const [view, setView] = useState(() => urlParams.get('view') === 'projector' ? 'projector' : 'dashboard');
            const [autoSwitchedToBracket, setAutoSwitchedToBracket] = useState(false);
            const [authError, setAuthError] = useState(null);
            const [editingPlayerId, setEditingPlayerId] = useState(null);
            const [editingPlayerName, setEditingPlayerName] = useState('');
            const [currentTime, setCurrentTime] = useState(Date.now());
            const [showResetConfirm, setShowResetConfirm] = useState(false);
            const [lastAction, setLastAction] = useState(null);
            const [setupStep, setSetupStep] = useState(1);
            const player1InputRef = useRef(null);

            // Switching rooms means setting up a different tournament from scratch
            useEffect(() => {
                setSetupStep(1);
            }, [tournamentId]);

            useEffect(() => {
                if (phase !== 'tournament' || view !== 'dashboard') return;
                const interval = setInterval(() => setCurrentTime(Date.now()), 10000);
                return () => clearInterval(interval);
            }, [phase, view]);

            // --- 1. FIREBASE AUTH SETUP ---
            useEffect(() => {
                let cancelled = false;
                let unsubscribe = () => {};

                getFirebase().then((fb) => {
                    if (cancelled) return;
                    const { auth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } = fb;

                    const initAuth = async () => {
                        try {
                            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                await signInWithCustomToken(auth, __initial_auth_token);
                            } else {
                                await signInAnonymously(auth);
                            }
                        } catch (error) {
                            console.error("Auth Error:", error);
                            setNotification({
                                title: 'Login Failed',
                                message: `Failed to connect to Firebase: ${error.message}. Make sure 'Anonymous Auth' is enabled in your Firebase Console!`,
                                type: 'error'
                            });
                            setAuthError(error.message);
                        }
                    };

                    initAuth();
                    unsubscribe = onAuthStateChanged(auth, setUser);
                }).catch((error) => {
                    if (!cancelled) setAuthError(error.message);
                });

                return () => { cancelled = true; unsubscribe(); };
            }, []);

            // --- 2. FIRESTORE REAL-TIME SYNC ---
            useEffect(() => {
                if (!user || !window.fb) return;
                const { db, doc, onSnapshot, appId } = window.fb;
                
                // NEW: Use tournamentId dynamically instead of hardcoded 'tournament'
                const tournamentDoc = doc(db, 'artifacts', appId, 'public', 'data', tournamentId || 'main', 'state');

                const unsubscribe = onSnapshot(tournamentDoc, (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        setPhase(data.phase || 'setup');
                        setTournamentName(data.tournamentName || 'Darts Event');
                        setGameMode(data.gameMode || 'knockout');
                        setIsDoubles(data.isDoubles || false);
                        setCaptainsCupMode(data.captainsCupMode || false);
                        setPlayers(data.players || []);
                        setBoardCount(data.boardCount || 2);
                        setMatches(data.matches || []);
                        setTotalRounds(data.totalRounds || 0);
                        setBoards(data.boards || []);
                        setBoardNames(data.boardNames || []);
                        setScorers(data.scorers || []);
                        setChampion(data.champion || null);
                        setAutoSwitchedToBracket(data.autoSwitchedToBracket || false);
                    } else if (phase !== 'setup') {
                        // If switching to a room that doesn't exist yet, reset local state to setup
                        setPhase('setup');
                        setPlayers([]);
                    }
                }, (error) => {
                    console.error("Sync error:", error);
                    setNotification({
                        title: 'Database Error',
                        message: `Could not read from Firestore: ${error.message}. Check your Firestore Security Rules!`,
                        type: 'error'
                    });
                });

                return () => unsubscribe();
            }, [user, tournamentId]); // NEW: Added tournamentId to dependencies

            const syncToCloud = async (updates) => {
                if (!user || !window.fb) return;
                const { db, doc, setDoc, appId } = window.fb;
                
                // NEW: Use tournamentId dynamically instead of hardcoded 'tournament'
                const tournamentDoc = doc(db, 'artifacts', appId, 'public', 'data', tournamentId || 'main', 'state');
                
                const currentState = {
                    phase, tournamentName, gameMode, isDoubles, captainsCupMode, players, boardCount, matches, 
                    totalRounds, boards, boardNames, scorers, champion, autoSwitchedToBracket
                };

                const safeState = JSON.parse(JSON.stringify({ ...currentState, ...updates }));

                try {
                    await setDoc(tournamentDoc, safeState, { merge: true });
                } catch (error) {
                    console.error("Cloud update failed", error);
                    setNotification({
                        title: 'Save Failed',
                        message: `Error: ${error.message}. Please check your Firestore rules!`,
                        type: 'error'
                    });
                }
            };

            const resetGame = () => {
                setPhase('setup');
                setChampion(null);
                setMatches([]);
                setBoards([]);
                setBoardNames([]);
                setScorers([]);
                setAutoSwitchedToBracket(false);
                setIsDoubles(false);
                setCaptainsCupMode(false);
                setPlayers([]);
                setView('dashboard');
                setLastAction(null);
                setSetupStep(1);

                syncToCloud({
                    phase: 'setup', champion: null, matches: [], boards: [], boardNames: [],
                    scorers: [], autoSwitchedToBracket: false, isDoubles: false, captainsCupMode: false, players: []
                });
            };

            const addPlayer = () => {
                let newNamesToCheck = []; 
                let newPlayers = [...players];

                if (isDoubles) {
                    const p1 = playerInput.trim(); 
                    const p2 = playerInput2.trim();
                    if (!p1 || !p2) return; 
                    if (p1.toLowerCase() === p2.toLowerCase()) {
                        setNotification({ title: 'Error', message: 'Same name twice for a team.', type: 'error' }); 
                        return;
                    }
                    newNamesToCheck = [`${p1} & ${p2}`];
                } else {
                    // Split by newlines or commas for bulk pasting
                    newNamesToCheck = playerInput.split(/[\n,]+/).map(n => n.trim()).filter(n => n);
                    if (newNamesToCheck.length === 0) return;
                }

                let addedCount = 0;
                let duplicateCount = 0;

                for (const name of newNamesToCheck) {
                    const existingParts = newPlayers.flatMap(p => p.name.split('&').map(n => n.trim().toLowerCase()));
                    const newParts = name.split('&').map(n => n.trim().toLowerCase());
                    
                    let hasDuplicate = false;
                    for (const part of newParts) {
                        if (existingParts.includes(part)) {
                            hasDuplicate = true;
                            break;
                        }
                    }

                    if (hasDuplicate) {
                        duplicateCount++;
                    } else {
                        // Append to end so seeds stay in numerical order (1st added is Seed 1)
                        newPlayers = [...newPlayers, { id: Date.now() + Math.random(), name: name }];
                        addedCount++;
                    }
                }

                if (duplicateCount > 0 && addedCount === 0) {
                    setNotification({ title: 'Duplicate', message: `Player(s) already registered!`, type: 'error' });
                } else if (addedCount > 0) {
                    setPlayers(newPlayers); 
                    syncToCloud({ players: newPlayers });
                    if (addedCount > 1) {
                        setNotification({ title: 'Bulk Added', message: `Successfully added ${addedCount} players!`, type: 'info' });
                    }
                }
                
                setPlayerInput(''); 
                setPlayerInput2('');
                player1InputRef.current?.focus();
            };

            const toggleCaptain = (name) => {
                const existingPlayer = players.find(p => p.name === name);
                
                if (existingPlayer) {
                    removePlayer(existingPlayer.id);
                } else {
                    const newPlayers = [...players, { id: Date.now() + Math.random(), name: name }];
                    setPlayers(newPlayers);
                    syncToCloud({ players: newPlayers });
                }
            };

            const removePlayer = (id) => {
                const newPlayers = players.filter(p => p.id !== id);
                setPlayers(newPlayers);
                syncToCloud({ players: newPlayers });
            };

            const startEditingPlayer = (player) => {
                setEditingPlayerId(player.id);
                setEditingPlayerName(player.name);
            };

            const saveEditedPlayer = () => {
                if (!editingPlayerName.trim()) {
                    setEditingPlayerId(null);
                    return;
                }
                
                const updatedPlayers = players.map(p => 
                    p.id === editingPlayerId ? { ...p, name: editingPlayerName.trim() } : p
                );
                
                setPlayers(updatedPlayers);
                syncToCloud({ players: updatedPlayers });
                setEditingPlayerId(null);
            };

            const startTournament = () => {
                if (players.length < 2) return;
                if (gameMode === 'knockout') generateKnockout();
                else if (gameMode === 'seeded48') generateSeeded48();
                else generateLeague();
            };

            const generateKnockout = () => {
                const shuffled = shuffleArray([...players]);
                const size = getNextPowerOf2(shuffled.length);
                const numByes = size - shuffled.length;
                let round1Matches = [];
                let playerIndex = 0;
                
                for (let i = 0; i < numByes; i++) {
                    const p = shuffled[playerIndex++];
                    round1Matches.push({
                        round: 1, p1: p, p2: { id: `bye-${i}`, name: 'BYE', isBye: true },
                        winner: p, status: 'completed', boardId: null, bracketSide: null,
                        announced: true // Byes don't need announcing
                    });
                }
                
                const numRealMatches = (size / 2) - numByes;
                for (let i = 0; i < numRealMatches; i++) {
                    round1Matches.push({
                        round: 1, p1: shuffled[playerIndex++], p2: shuffled[playerIndex++],
                        winner: null, status: 'pending', boardId: null, bracketSide: null
                    });
                }
                
                round1Matches = shuffleArray(round1Matches);
                const halfSize = round1Matches.length / 2;
                round1Matches = round1Matches.map((m, index) => ({ ...m, bracketSide: index < halfSize ? 'left' : 'right' }));

                let matchIdCounter = 1;
                const calculatedTotalRounds = Math.log2(size);
                let allMatches = [];
                round1Matches = round1Matches.map(m => ({ ...m, id: matchIdCounter++ }));
                allMatches = [...round1Matches];

                let previousRoundMatches = round1Matches;
                for (let r = 2; r <= calculatedTotalRounds; r++) {
                    let nextRoundMatches = [];
                    for (let i = 0; i < previousRoundMatches.length; i += 2) {
                        const m1 = previousRoundMatches[i];
                        const m2 = previousRoundMatches[i+1];
                        const isFinal = r === calculatedTotalRounds;
                        const newMatch = {
                            id: matchIdCounter++, round: r, p1: null, p2: null, 
                            sourceMatch1: m1.id, sourceMatch2: m2.id, winner: null, 
                            status: 'scheduled', boardId: null, bracketSide: isFinal ? 'center' : m1.bracketSide 
                        };
                        m1.nextMatchId = newMatch.id; m2.nextMatchId = newMatch.id;
                        nextRoundMatches.push(newMatch);
                        allMatches.push(newMatch);
                    }
                    previousRoundMatches = nextRoundMatches;
                }
                finalizeStart(allMatches, calculatedTotalRounds);
            };

            const generateSeeded48 = () => {
                let activePlayers = [...players];
                // Limit to 48, or pad with Byes if under 48
                if (activePlayers.length > 48) activePlayers = activePlayers.slice(0, 48);
                while (activePlayers.length < 48) {
                    activePlayers.push({ id: `bye-${Date.now()}-${activePlayers.length}`, name: 'BYE', isBye: true });
                }

                // Standard bracket mapping to ensure 1 plays 16, 8 plays 9 etc in later rounds
                const top16Order = [1, 16, 8, 9, 5, 12, 4, 13, 2, 15, 7, 10, 6, 11, 3, 14];
                let matchIdCounter = 1;
                let r1Matches = [];
                let r2Matches = [];

                // Generate Round 1 matches (Seeds 17-48)
                top16Order.forEach((seedX, index) => {
                    const oppSeed = 33 - seedX; // e.g. If Seed 1, opp = 32
                    const r1Opp = 32 + seedX;   // e.g. If Seed 1, opp2 = 33

                    const p1_r1 = activePlayers[oppSeed - 1];
                    const p2_r1 = activePlayers[r1Opp - 1];

                    const isBye = p2_r1.isBye || p1_r1.isBye;
                    const winner_r1 = p2_r1.isBye ? p1_r1 : (p1_r1.isBye ? p2_r1 : null);

                    const m1 = {
                        id: matchIdCounter++,
                        round: 1,
                        p1: p1_r1,
                        p2: p2_r1,
                        status: isBye ? 'completed' : 'pending',
                        winner: winner_r1,
                        boardId: null,
                        bracketSide: index < 8 ? 'left' : 'right',
                        announced: isBye
                    };
                    r1Matches.push(m1);
                });

                // Generate Round 2 matches (Top 16 vs R1 Winners)
                r1Matches.forEach((m1, index) => {
                    const seedX = top16Order[index];
                    const p1_r2 = activePlayers[seedX - 1];

                    const m2 = {
                        id: matchIdCounter++,
                        round: 2,
                        p1: p1_r2,
                        p2: m1.winner, // Prepops if R1 was a BYE
                        sourceMatch1: null, // Hardcoded waiting directly on seed
                        sourceMatch2: m1.id,
                        status: (p1_r2 && !p1_r2.isBye && m1.winner) ? 'pending' : 'scheduled',
                        winner: null,
                        boardId: null,
                        bracketSide: index < 8 ? 'left' : 'right',
                        announced: false
                    };
                    m1.nextMatchId = m2.id;
                    r2Matches.push(m2);
                });

                let allMatches = [...r1Matches, ...r2Matches];

                // Rounds 3 to 6 build identical to standard knockout
                let previousRoundMatches = r2Matches;
                const tRounds = 6; 

                for (let r = 3; r <= tRounds; r++) {
                    let nextRoundMatches = [];
                    for (let i = 0; i < previousRoundMatches.length; i += 2) {
                        const m1 = previousRoundMatches[i];
                        const m2 = previousRoundMatches[i+1];
                        const isFinal = r === tRounds;
                        const newMatch = {
                            id: matchIdCounter++, round: r, p1: null, p2: null,
                            sourceMatch1: m1.id, sourceMatch2: m2.id, winner: null,
                            status: 'scheduled', boardId: null, bracketSide: isFinal ? 'center' : m1.bracketSide
                        };
                        m1.nextMatchId = newMatch.id;
                        m2.nextMatchId = newMatch.id;
                        nextRoundMatches.push(newMatch);
                        allMatches.push(newMatch);
                    }
                    previousRoundMatches = nextRoundMatches;
                }

                finalizeStart(allMatches, tRounds);
            };

            const generateLeague = () => {
                let leaguePlayers = shuffleArray([...players]);
                if (leaguePlayers.length % 2 !== 0) leaguePlayers.push({ id: 'bye', name: 'BYE', isBye: true });
                const n = leaguePlayers.length;
                const numRounds = n - 1;
                const half = n / 2;
                let allMatches = [];
                let matchIdCounter = 1;
                let currentPlayers = [...leaguePlayers];

                for (let round = 0; round < numRounds; round++) {
                    for (let i = 0; i < half; i++) {
                        const p1 = currentPlayers[i];
                        const p2 = currentPlayers[n - 1 - i];
                        if (!p1.isBye && !p2.isBye) {
                            allMatches.push({
                                id: matchIdCounter++, round: round + 1, p1: p1, p2: p2,
                                winner: null, status: 'pending', boardId: null, mode: 'league'
                            });
                        }
                    }
                    currentPlayers.splice(1, 0, currentPlayers.pop());
                }
                finalizeStart(allMatches, numRounds);
            };

            const finalizeStart = (generatedMatches, tRounds) => {
                let initialBoards = Array(boardCount).fill(null);
                
                const { updatedMatches, updatedBoards } = processTournamentProgression(generatedMatches, initialBoards, gameMode);
                
                setMatches(updatedMatches);
                setTotalRounds(tRounds);
                setBoards(updatedBoards);
                setBoardNames(Array(boardCount).fill(''));
                setScorers(Array(boardCount).fill(null));
                setPhase('tournament');
                setAutoSwitchedToBracket(false);

                syncToCloud({
                    matches: updatedMatches,
                    totalRounds: tRounds,
                    boards: updatedBoards,
                    boardNames: Array(boardCount).fill(''),
                    scorers: Array(boardCount).fill(null),
                    phase: 'tournament',
                    autoSwitchedToBracket: false
                });
            };

            const copyResultsToClipboard = () => {
                const completed = matches.filter(m => m.status === 'completed' && !m.p2?.isBye).reverse();
                if(completed.length === 0) return;
                let text = `🎯 *RESULTS* 🎯\n\n`;
                completed.forEach(m => {
                    text += `${getRoundLabel(m.round)}: ${m.winner.name} def. ${m.winner.id === m.p1.id ? m.p2.name : m.p1.name}\n`;
                });
                
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    setNotification({ title: 'Copied!', message: 'Results copied.', type: 'info' });
                } catch (err) {
                    window.prompt("Copy results:", text);
                }
                document.body.removeChild(textArea);
            };

            const getRoundLabel = (round) => {
                if (gameMode === 'league') return `Game ${round}`;
                if (round === totalRounds) return "Final";
                if (round === totalRounds - 1) return "Semi Final";
                if (round === totalRounds - 2) return "Quarter Final";
                if (gameMode === 'seeded48') {
                    if (round === 1) return "Round 1";
                    if (round === 2) return "Round 2 (L32)";
                    if (round === 3) return "Last 16";
                }
                return `Round ${round}`;
            };

            const adjustBoardCount = (increment) => {
                if (increment) {
                    const newBoards = [...boards, null];
                    const newBoardNames = [...boardNames, ''];
                    const newScorers = [...scorers, null];
                    
                    const { updatedMatches, updatedBoards } = processTournamentProgression(matches, newBoards, gameMode);
                    
                    setBoards(updatedBoards);
                    setBoardNames(newBoardNames);
                    setScorers(newScorers);
                    setBoardCount(boardCount + 1);
                    setMatches(updatedMatches);

                    syncToCloud({ 
                        boards: updatedBoards, 
                        matches: updatedMatches,
                        boardNames: newBoardNames, 
                        scorers: newScorers, 
                        boardCount: boardCount + 1 
                    });
                } else {
                    if (boards.length <= 1) return;
                    
                    const lastIdx = boards.length - 1;
                    const matchId = boards[lastIdx];
                    
                    if (matchId !== null) {
                        setNotification({ 
                            title: 'Board in Use', 
                            message: `Cannot remove Board ${boards.length} because a match is currently playing on it. Please wait for it to finish!`, 
                            type: 'error' 
                        });
                        return;
                    }
                    
                    const newBoards = boards.slice(0, -1);
                    const newBoardNames = boardNames.slice(0, -1);
                    const newScorers = scorers.slice(0, -1);

                    setBoards(newBoards);
                    setBoardNames(newBoardNames);
                    setScorers(newScorers);
                    setBoardCount(boardCount - 1);

                    syncToCloud({
                        boards: newBoards,
                        boardNames: newBoardNames,
                        scorers: newScorers,
                        boardCount: boardCount - 1
                    });
                }
            };
            
            const updateBoardName = (index, newName) => {
                const newNames = [...boardNames];
                newNames[index] = newName;
                setBoardNames(newNames);
                syncToCloud({ boardNames: newNames });
            };

            const setMatchWinner = (matchId, winnerPlayer) => {
                const match = matches.find(m => m.id === matchId);
                if (!match) return;
                const loser = match.p1.id === winnerPlayer.id ? match.p2 : match.p1;
                
                let newBoards = [...boards];
                let newScorers = [...scorers];
                
                if (match.boardId !== null) {
                    newScorers[match.boardId] = loser.name;
                    newBoards[match.boardId] = null;
                }

                let newMatches = matches.map(m => m.id === matchId ? { ...m, status: 'completed', winner: winnerPlayer, boardId: null } : m);

                const { updatedMatches, updatedBoards, newChampion } = processTournamentProgression(newMatches, newBoards, gameMode);

                setMatches(updatedMatches);
                setBoards(updatedBoards);
                setScorers(newScorers);
                setLastAction({ matchId, winnerName: winnerPlayer.name, loserName: loser.name });

                let finalPhase = phase;
                if (newChampion) {
                    setChampion(newChampion);
                    setPhase('complete');
                    finalPhase = 'complete';
                }

                syncToCloud({ 
                    matches: updatedMatches, 
                    boards: updatedBoards, 
                    scorers: newScorers,
                    champion: newChampion || champion,
                    phase: finalPhase
                });
            };

            const undoMatch = (matchId) => {
                const match = matches.find(m => m.id === matchId);
                if (!match) return; 
                let newBoards = [...boards];
                let newScorers = [...scorers];
                
                if (match.boardId !== null) {
                    newBoards[match.boardId] = null;
                    newScorers[match.boardId] = null;
                }
                
                const nextMatch = matches.find(m => m.id === match.nextMatchId);
                if (nextMatch && nextMatch.boardId !== null) {
                    newBoards[nextMatch.boardId] = null;
                    newScorers[nextMatch.boardId] = null;
                }

                let newMatches = matches.map(m => {
                    if (m.id === matchId) return { ...m, winner: null, status: 'pending', boardId: null, startTime: null, announced: false };
                    if ((gameMode === 'knockout' || gameMode === 'seeded48') && m.id === match.nextMatchId) {
                        const isP1 = m.sourceMatch1 === matchId;
                        return { ...m, p1: isP1 ? null : m.p1, p2: !isP1 ? null : m.p2, winner: null, status: 'scheduled', boardId: null, startTime: null, announced: false };
                    }
                    return m;
                });

                const { updatedMatches, updatedBoards, newChampion } = processTournamentProgression(newMatches, newBoards, gameMode);

                setMatches(updatedMatches);
                setBoards(updatedBoards);
                setScorers(newScorers);
                setChampion(newChampion || null);
                setPhase('tournament');
                setLastAction(prev => prev?.matchId === matchId ? null : prev);

                syncToCloud({
                    matches: updatedMatches,
                    boards: updatedBoards,
                    scorers: newScorers,
                    champion: newChampion || null,
                    phase: 'tournament'
                });
            };

            const markAnnounced = (matchId) => {
                const updatedMatches = matches.map(m => m.id === matchId ? { ...m, announced: true } : m);
                setMatches(updatedMatches);
                syncToCloud({ matches: updatedMatches });
            };

            const activePlayersCount = useMemo(() => {
                if (gameMode === 'league') return players.length;
                const eliminatedIds = matches
                    .filter(m => m.status === 'completed' && m.winner && !m.p2?.isBye)
                    .map(m => m.p1?.id === m.winner?.id ? m.p2?.id : m.p1?.id)
                    .filter(id => id);
                return players.length - eliminatedIds.length;
            }, [matches, players, gameMode]);

            const top16Byes = useMemo(() => {
                if (gameMode === 'seeded48') {
                    return players.slice(0, 16).map(p => p.name);
                }
                return matches.filter(m => m.round === 1 && m.p2?.isBye).map(m => m.p1.name);
            }, [matches, gameMode, players]);

            const matchesToAnnounce = useMemo(() => {
                return matches.filter(m => m.status === 'active' && m.announced === false && m.boardId !== null && m.p1 && m.p2 && !m.p1.isBye && !m.p2.isBye);
            }, [matches]);

            if (!user) {
                return (
                    <div className="h-full flex flex-col items-center justify-center text-slate-600 uppercase font-black tracking-widest gap-4">
                        <div className="animate-pulse">Waking up Firestore...</div>
                        {authError && <div className="text-red-500 text-sm normal-case text-center max-w-md mt-4 border border-red-900 bg-red-950 p-4 rounded">{authError}</div>}
                    </div>
                );
            }

            return (
                <div className="h-full bg-slate-900 text-slate-100 font-sans flex flex-col overflow-hidden relative">
                    {notification && <Modal title={notification.title} message={notification.message} type={notification.type} onClose={() => setNotification(null)} />}
                    {phase === 'complete' && <Confetti />}

                    {lastAction && (
                        <div className="fixed bottom-4 left-1/2 -translate-x-1/2 z-[65] w-full max-w-md px-4">
                            <div className="bg-slate-800 border-2 border-emerald-500 rounded-xl shadow-2xl p-4 flex items-center justify-between gap-4 animate-fade-in">
                                <div className="text-sm min-w-0">
                                    <div className="text-slate-400 uppercase text-[10px] font-black tracking-widest">Last Result</div>
                                    <div className="text-white font-bold truncate">{lastAction.winnerName} <span className="text-slate-500 font-normal">beat</span> {lastAction.loserName}</div>
                                </div>
                                <div className="flex items-center gap-2 shrink-0">
                                    <Button variant="outline" className="py-2 px-4 text-sm" onClick={() => undoMatch(lastAction.matchId)}>↺ Undo</Button>
                                    <button onClick={() => setLastAction(null)} className="text-slate-500 hover:text-white text-xl px-1" title="Dismiss">✕</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showResetConfirm && (
                        <div className="fixed inset-0 z-[70] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
                            <div className="bg-slate-800 border-2 border-red-500 rounded-xl shadow-2xl max-w-sm w-full p-6 space-y-4 animate-fade-in">
                                <div className="text-center">
                                    <div className="text-4xl mb-2">⚠️</div>
                                    <h3 className="text-2xl font-bold text-white tracking-wide">End Tournament?</h3>
                                    <div className="text-slate-200 text-xl mt-3 font-medium leading-relaxed">Are you sure you want to clear all data for everyone?</div>
                                </div>
                                <div className="flex gap-4 mt-6">
                                    <Button onClick={() => setShowResetConfirm(false)} variant="secondary" className="flex-1">Cancel</Button>
                                    <Button onClick={() => { setShowResetConfirm(false); resetGame(); }} variant="danger" className="flex-1">End It</Button>
                                </div>
                            </div>
                        </div>
                    )}

                    {view === 'dashboard' && phase === 'tournament' && matchesToAnnounce.length > 0 && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
                            <div key={matchesToAnnounce[0].id} className="bg-slate-800 border-4 border-amber-500 rounded-2xl shadow-[0_0_50px_rgba(245,158,11,0.3)] max-w-md w-full p-8 text-center animate-fade-in">
                                <div className="text-7xl mb-4">📢</div>
                                <h3 className="text-3xl font-black text-amber-400 uppercase tracking-widest mb-6">Call to Oche!</h3>
                                
                                <div className="text-slate-200 text-2xl font-bold leading-relaxed mb-8">
                                    <div className="text-white text-3xl mb-2 truncate px-2">{matchesToAnnounce[0].p1?.name}</div>

                                                    );
                                                })}
                                            </div>
                                        </section>

                                        <section className="pt-8 border-t border-slate-700 max-w-3xl mx-auto w-full">
                                            <div className="flex justify-between items-center mb-4">
                                                <h3 className="text-slate-400 text-xs font-black uppercase tracking-widest italic opacity-50 underline decoration-emerald-500">Live History</h3>
                                                <Button onClick={copyResultsToClipboard} variant="outline" className="text-[10px] py-2 h-auto uppercase">📋 WhatsApp Summary</Button>
                                            </div>
                                            <div className="flex flex-col gap-2">
                                                {matches.filter(m => m.status === 'completed' && !m.p2?.isBye).slice(-5).reverse().map(m => (
                                                    <div key={m.id} className="flex justify-between items-center bg-slate-800/30 p-3 rounded-lg text-sm border border-slate-800">
                                                        <span className="text-slate-500 font-bold uppercase text-[10px]">{m.p1?.name} vs {m.p2?.name}</span>
                                                        <div className="flex items-center gap-3">
                                                            <span className="text-emerald-500 font-black text-sm italic uppercase tracking-tighter">{m.winner?.name} Won</span>
                                                            <button onClick={() => undoMatch(m.id)} className="p-1.5 bg-slate-700 hover:bg-red-900/40 rounded transition-colors text-lg" title="Undo Result">↺</button>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </section>
                                    </div>
                                )}

                                {/* --- UPCOMING VIEW --- */}
                                {phase === 'tournament' && view === 'upcoming' && (
                                    <div className="w-full max-w-4xl mx-auto p-4 space-y-8">
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <Card className="p-6 text-center border-emerald-500/30">
                                                <h3 className="text-slate-400 font-black uppercase tracking-widest text-sm mb-2">Players Remaining</h3>
                                                <p className="text-6xl font-black text-emerald-400">{activePlayersCount} <span className="text-2xl text-slate-500">/ {players.length}</span></p>
                                            </Card>
                                            <Card className="p-6">
                                                <h3 className="text-slate-400 font-black uppercase tracking-widest text-sm mb-4">Round 1 Byes / Top Seeds</h3>
                                                <div className="flex flex-wrap gap-2">
                                                    {top16Byes.length > 0 ? top16Byes.map((name, i) => (
                                                        <span key={i} className="bg-slate-700 text-white px-3 py-1 rounded-full text-sm font-bold">{name}</span>
                                                    )) : <span className="text-slate-500 italic">No byes in this tournament</span>}
                                                </div>
                                            </Card>
                                        </div>

                                        <div>
                                            <h3 className="text-slate-300 text-lg font-black uppercase tracking-widest mb-4">Upcoming Matches</h3>
                                            <div className="space-y-3">
                                                {matches.filter(m => m.status === 'pending' || m.status === 'scheduled').length === 0 ? (
                                                    <div className="text-center p-8 bg-slate-800 rounded-lg border border-slate-700 text-slate-500 italic">No upcoming matches at the moment.</div>
                                                ) : (
                                                    matches
                                                        .filter(m => m.status === 'pending' || m.status === 'scheduled')
                                                        .sort((a, b) => {
                                                            if (a.status === 'pending' && b.status !== 'pending') return -1;
                                                            if (a.status !== 'pending' && b.status === 'pending') return 1;
                                                            return (a.round - b.round) || (a.id - b.id);
                                                        })
                                                        .map(m => (
                                                        <div key={m.id} className="bg-slate-800 p-5 rounded-lg border border-slate-700 flex flex-col sm:flex-row justify-between sm:items-center gap-4">
                                                            <div className="flex items-center gap-4 flex-1">
                                                                <span className={`font-black text-lg ${m.p1 ? 'text-white' : 'text-slate-500'}`}>{m.p1 ? m.p1.name : 'TBD'}</span>
                                                                <span className="text-slate-600 font-black text-sm italic">VS</span>
                                                                <span className={`font-black text-lg ${m.p2 ? 'text-white' : 'text-slate-500'}`}>{m.p2 ? m.p2.name : 'TBD'}</span>
                                                            </div>
                                                            <div className="flex gap-2">
                                                                <span className="text-xs text-emerald-400 font-bold border border-emerald-500/30 bg-emerald-900/20 px-3 py-1.5 rounded uppercase tracking-widest whitespace-nowrap">{getRoundLabel(m.round)}</span>
                                                                <span className={`text-xs font-bold px-3 py-1.5 rounded uppercase tracking-widest whitespace-nowrap ${m.status === 'pending' ? 'bg-blue-900/30 text-blue-400 border border-blue-500/30' : 'bg-slate-700 text-slate-400'}`}>
                                                                    {m.status === 'pending' ? 'Ready' : 'Waiting'}
                                                                </span>
                                                            </div>
                                                        </div>
                                                    ))
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* --- BRACKET VIEW --- */}
                                {phase === 'tournament' && view === 'bracket' && (
                                    <div className="w-full h-full overflow-auto p-4 md:p-8">
                                        {gameMode === 'league' ? (
                                            <div className="max-w-2xl mx-auto mt-20 text-center bg-slate-800 p-8 rounded-xl border border-slate-700">
                                                <div className="text-4xl mb-4">📊</div>
                                                <h2 className="text-2xl font-black text-white mb-2 uppercase tracking-wide">League View Active</h2>
                                                <p className="text-slate-400">The visual bracket is only available for Knockout and Seeded tournaments.</p>
                                                <Button onClick={() => setView('dashboard')} className="mx-auto mt-6">Go to Boards</Button>
                                            </div>
                                        ) : (
                                            <div className="flex gap-8 md:gap-16 min-w-max pb-8">
                                                {Array.from({length: totalRounds}, (_, i) => i + 1).map(round => (
                                                    <div key={round} className="flex flex-col justify-around gap-6 w-64 md:w-72">
                                                        <h3 className="text-center font-black text-emerald-500 uppercase tracking-widest mb-2 sticky top-0 bg-slate-900 py-2 z-10 border-b border-slate-700">{getRoundLabel(round)}</h3>
                                                        {matches.filter(m => m.round === round && !m.p2?.isBye).map(m => (
                                                            <div key={m.id} className={`bg-slate-800 rounded-lg border-2 p-4 shadow-lg ${m.status === 'active' ? 'border-emerald-500 shadow-emerald-900/20' : m.status === 'completed' ? 'border-slate-700 opacity-60' : 'border-slate-600'}`}>
                                                                <div className="flex flex-col gap-2">
                                                                    <div className={`font-bold truncate text-lg ${m.winner && m.p1 && m.winner.id === m.p1.id ? 'text-emerald-400' : 'text-slate-200'}`}>{m.p1 ? m.p1.name : 'TBD'}</div>
                                                                    <div className="h-px bg-slate-700 w-full"></div>
                                                                    <div className={`font-bold truncate text-lg ${m.winner && m.p2 && m.winner.id === m.p2.id ? 'text-emerald-400' : 'text-slate-200'}`}>{m.p2 ? m.p2.name : 'TBD'}</div>
                                                                </div>
                                                                {m.status === 'active' && <div className="mt-3 text-[10px] text-center text-emerald-400 uppercase font-bold tracking-widest animate-pulse">Playing Now</div>}
                                                            </div>
                                                        ))}
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                )}

                                {phase === 'complete' && (
                                    <div className="min-h-full flex items-center justify-center p-4">
                                        <div className="text-center space-y-8 bg-slate-800 p-8 rounded-2xl border-2 border-yellow-500 shadow-2xl">
                                            <div className="text-8xl">🏆</div>
                                            <div>
                                                <h2 className="text-2xl text-slate-400 uppercase tracking-widest font-black italic">Tournament Champion</h2>
                                                <h1 className="text-6xl font-black text-white mt-4 tracking-tighter uppercase italic">{champion?.name}</h1>
                                            </div>
                                            <div className="flex gap-4 justify-center">
                                                <Button onClick={copyResultsToClipboard} variant="secondary">📋 Copy Results</Button>
                                                <Button onClick={() => setShowResetConfirm(true)} variant="outline">🔄 New Season</Button>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </>
                        )}
                    </div>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
